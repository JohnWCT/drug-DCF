# Round 24 eval3 protocol — Round 18 5 source-fold + Stage 18E TCGA
round: round24
protocol_name: eval3
n_folds: 5
target_gpu_utilization: 0.9
max_jobs_per_gpu: 3

paths:
  project_root: .
  round18_root: result/optimization_runs/round18_architecture
  round18_settings: config/round18_architecture_settings.json
  reports_root: reports/round24
  run_root: result/optimization_runs/round24_tcga_recovery
  drug_smiles: data/GDSC_drug_merge_pubchem_dropNA_MACCS_AACDR_extended.csv
  feature_own_plus_summary: result/optimization_runs/round17r_18class/features/r13_exp_008/own_plus_summary
  feature_c16: result/optimization_runs/round20_unseen_drug_closure/features/z_plus_context16
  feature_c32: result/optimization_runs/round20_unseen_drug_closure/features/z_plus_context32

targets:
  # Round 24 gates = AACDR stest0 (no 10% holdout/test) standard.
  # Source: docs/AACDR_drug_macro_auroc_auprc.md (eval3_stest0 / target_infer_stest0)
  - key: gdsc_intersect13
    path: data/TCGA/PMID27354694_DR_OMICS_ad_intersect_pretrain_gdsc_intersect13.csv
    gate_auroc: 0.5197
    gate_auprc: 0.5981
    gate_auroc_std: 0.0269
    gate_auprc_std: 0.0222
    headline_n_pairs: 906
  - key: tcga_only3
    path: data/TCGA/PMID27354694_DR_OMICS_ad_intersect_pretrain_tcga_only3.csv
    gate_auroc: 0.5536
    gate_auprc: 0.6960
    gate_auroc_std: 0.0449
    gate_auprc_std: 0.0286
    headline_n_pairs: 129
  - key: dapl
    path: data/TCGA/TCGA_drug_response_from_DAPL.csv
    gate_auroc: 0.5304
    gate_auprc: 0.5570
    gate_auroc_std: 0.0061
    gate_auprc_std: 0.0117
    headline_n_pairs: 178
  - key: aacdr_gdsc_intersect
    path: data/TCGA/TCGA_AACDR_response_final_with_smiles_intersect_pretrain_gdsc_intersect.csv
    gate_auroc: 0.5279
    gate_auprc: 0.5710
    gate_auroc_std: 0.0312
    gate_auprc_std: 0.0122
    headline_n_pairs: 425
  - key: aacdr_tcga_only
    path: data/TCGA/TCGA_AACDR_response_final_with_smiles_intersect_pretrain_tcga_only.csv
    gate_auroc: 0.4804
    gate_auprc: 0.6300
    gate_auroc_std: 0.0414
    gate_auprc_std: 0.0419
    headline_n_pairs: 97

standard_name: aacdr_stest0_no_holdout
standard_doc: docs/AACDR_drug_macro_auroc_auprc.md

# Hard PASS: only these two must beat AACDR stest0 AUROC.
# Remaining targets are always reported (AUROC+AUPRC) but are not lock-blocking.
gate_required_targets:
  - aacdr_gdsc_intersect
  - aacdr_tcga_only

# Soft ranking among PASS candidates (5:4:3:2:1).
# Priority high→low: aacdr_gdsc_intersect > aacdr_tcga_only > dapl > gdsc_intersect13 > tcga_only3
target_priority:
  - aacdr_gdsc_intersect
  - aacdr_tcga_only
  - dapl
  - gdsc_intersect13
  - tcga_only3

target_weights:
  aacdr_gdsc_intersect: 5
  aacdr_tcga_only: 4
  dapl: 3
  gdsc_intersect13: 2
  tcga_only3: 1

drug_macro:
  min_samples: 10
  min_positive: 2
  min_negative: 2

baseline:
  architecture_id: pooled_mlp__own_plus_summary
  omics_mode: own_plus_summary
  feature_dir: result/optimization_runs/round17r_18class/features/r13_exp_008/own_plus_summary

candidates_24b:
  - id: B0
    architecture: pooled_mlp
    feature: own_plus_summary
    reuse_round18: true
  - id: B1
    architecture: biocda_predictive_e3
    feature: z_plus_context32
    reuse_round18: false
  - id: B2
    architecture: biocda_xa_fresh
    feature: z_plus_context32
    reuse_round18: false

training:
  max_epochs: 200
  early_stopping_patience: 20
  early_stopping_metric: validation_drug_macro_auc
  micro_batch_size: 512
  gradient_clip_norm: 1.0
  predictive_warmstart_gin: true
  accumulation_steps: 4
  learning_rate: 0.0003
  weight_decay: 0.0001
  mixed_precision: true
  forbid_tcga_in_selection: true

locks:
  supersedes:
    - reports/round20_final_model_lock_public.json
    - reports/biocda_xa_model_lock.json
  output: reports/round24_final_model_lock.json
